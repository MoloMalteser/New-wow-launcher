<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sword" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Sword -->
  <g transform="translate(64, 64)">
    <!-- Sword blade -->
    <rect x="-3" y="-25" width="6" height="50" fill="url(#sword)" rx="1"/>
    <!-- Sword handle -->
    <rect x="-8" y="15" width="16" height="4" fill="#8b4513" rx="2"/>
    <!-- Sword guard -->
    <rect x="-12" y="-2" width="24" height="4" fill="#8b4513" rx="2"/>
    <!-- Sword pommel -->
    <circle cx="0" cy="17" r="3" fill="#ffd700"/>
  </g>
  
  <!-- W text -->
  <text x="64" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">W</text>
</svg>